version: '3.8'

services:
  backend:
    build: ./backend
    container_name: texas-holdem-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DEBUG=false
      - DATABASE_URL=sqlite+aiosqlite:///./texas_holdem.db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - poker-network

  frontend:
    build: ./frontend
    container_name: texas-holdem-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8888}:80"
    depends_on:
      - backend
    networks:
      - poker-network

networks:
  poker-network:
    driver: bridge